services:
  web:
    build:
      context: .
      args:
        VITE_CONTACT_EMAIL: ${VITE_CONTACT_EMAIL:-info@pulsewavetech.io}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://pulsewavetech.io}
    image: pulse-wave-hq:latest
    container_name: pulse-wave-hq
    restart: unless-stopped
    # No host port published — cloudflared reaches `web:80` over the internal docker network,
    # which avoids port collisions on hosts running many stacks. Debug from the host with:
    #   docker compose exec web wget -qO- http://127.0.0.1/healthz
    networks:
      - pulsewave
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Cloudflare Tunnel — only started with the "tunnel" profile so local dev
  # (docker compose up) doesn't require a TUNNEL_TOKEN.
  # Production:  docker compose --profile tunnel up -d --build
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pulse-wave-hq-tunnel
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARED_TOKEN}
    depends_on:
      web:
        condition: service_healthy
    networks:
      - pulsewave

networks:
  pulsewave:
    driver: bridge
