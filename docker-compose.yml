services:
  web:
    build:
      context: .
      args:
        VITE_CONTACT_EMAIL: ${VITE_CONTACT_EMAIL:-info@pulsewavetech.io}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://pulsewavetech.io}
    image: pulse-wave-hq:latest
    container_name: pulse-wave-hq
    restart: unless-stopped
    # Bind to loopback only — Cloudflare Tunnel (Phase 3) is the only public path in.
    # Change to "8080:80" if you want LAN access during debugging.
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
