server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

  # Health check for container + Cloudflare Tunnel.
  # No security headers needed here — it's a plaintext ok.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Hashed assets — safe to cache aggressively.
  # `^~` makes this the winning match for /assets/* so the regex location
  # below never strips the immutable TTL off hashed images (e.g. /assets/x.png).
  # Security headers must be repeated here because nginx `add_header`
  # directives are NOT inherited across levels once a level defines any.
  location ^~ /assets/ {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Root-level static files (favicon.ico/.png, apple-touch-icon.png, robots.txt,
  # CNAME-adjacent assets, etc.) — these have stable, unhashed names, so cache
  # them but force revalidation (ETag/Last-Modified). A changed favicon then
  # propagates through Cloudflare's edge immediately on the next request instead
  # of being pinned for Cloudflare's default static TTL — no manual purge needed.
  # Missing files 404 here rather than falling through to the SPA shell.
  location ~* \.(?:ico|png|jpe?g|gif|svg|webp|avif|txt|xml|webmanifest)$ {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
  }

  # HTML entrypoint — never cache so deploys are visible immediately.
  location = /index.html {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # SPA fallback — any unknown route serves index.html so React Router can handle it.
  # The internal rewrite re-enters `location = /index.html`, inheriting those headers.
  location / {
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    try_files $uri $uri/ /index.html;
  }
}
